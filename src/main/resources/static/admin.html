<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hive | Admin Command</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #081229 !important; transition: all 0.5s ease-in-out;
               background-image: radial-gradient(circle at 15% 50%, rgba(0, 242, 254, 0.35), transparent 40%), radial-gradient(circle at 85% 30%, rgba(255, 0, 222, 0.35), transparent 40%), linear-gradient(rgba(0, 242, 254, 0.12) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 254, 0.12) 1px, transparent 1px) !important; background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px !important; background-attachment: fixed !important; }
        .main { margin-left: 280px; flex: 1; padding: 40px; position: relative; z-index: 1; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.4s ease; }
    </style>
</head>
<body class="light-mode">
<div class="hive-watermark">HIVE</div>

<div class="sidebar" id="sidebar">
    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 40px; padding: 20px;">
        <div class="sb-hex" style="background: #4CAF50;"><i class="fa-solid fa-bolt"></i></div>
        <div class="brand-title">OVERSEER</div>
    </div>
    <div class="nav-item active" onclick="switchTab('system', this)"><i class="fa-solid fa-chart-line"></i> System Overview</div>
    <div class="nav-item" onclick="switchTab('users', this)"><i class="fa-solid fa-users-gear"></i> User Registry</div>
    <div class="nav-item" onclick="switchTab('progress', this)"><i class="fa-solid fa-chart-pie"></i> Student Progress</div>
    <div class="nav-item" style="margin-top: auto; color: var(--danger);" onclick="logout()"><i class="fa-solid fa-power-off"></i> Terminate</div>
</div>

<div class="main">
    <div class="header">
        <div><h1>Command Center</h1><p>System Status: <span style="color: #4CAF50; font-weight: bold;">ONLINE</span></p></div>
        <div class="header-profile"><span class="badge" style="background: #4CAF50;">System Admin</span></div>
    </div>

    <div id="view-system" class="view-section active">
        <div class="panel" style="border-left: 4px solid var(--gold); margin-bottom: 25px; background: rgba(212, 136, 10, 0.05);">
            <h2 style="color: var(--gold);"><i class="fa-solid fa-sitemap"></i> Deploy New Course</h2>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="new-course-code" placeholder="Code (CS101)">
                <input type="text" id="new-course-title" placeholder="Module Title">
                <button class="btn-gold" onclick="saveCourse()">Deploy</button>
            </div>
        </div>
        <div class="content-grid">
            <div class="panel"><h2>Registered Users</h2><h1 id="stat-users" style="color:var(--gold);">0</h1></div>
        </div>
    </div>

    <div id="view-users" class="view-section"><div class="panel"><h2>User Registry</h2><div id="users-container"></div></div></div>

    <div id="view-progress" class="view-section">
        <div class="panel">
            <h2>Student Progression Analytics</h2>
            <p style="color: var(--text-2); margin-bottom: 10px;">Skill points ranking across all registered students.</p>
            <div class="chart-container" style="height: 400px;"><canvas id="adminProgressChart"></canvas></div>
        </div>
    </div>
</div>

<script>
    const user = JSON.parse(localStorage.getItem('hive_user'));
    if (!user || user.role !== 'admin') window.location.href = "index.html";

    function switchTab(tabId, element) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        if(element) element.classList.add('active');
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.getElementById('view-' + tabId).classList.add('active');
        if(tabId === 'system' || tabId === 'users' || tabId === 'progress') loadAdminData();
    }

    async function saveCourse() {
        const code = document.getElementById('new-course-code').value;
        const title = document.getElementById('new-course-title').value;
        if(!code || !title) return alert("Complete fields.");
        await fetch('/api/hive/admin/courses', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ deptId: 1, courseCode: code, title: title }) });
        alert("Course created!"); document.getElementById('new-course-code').value = ''; document.getElementById('new-course-title').value = '';
    }

    async function loadAdminData() {
        const uRes = await fetch('/api/admin/users');
        const users = await uRes.json();
        document.getElementById('stat-users').innerText = users.length;

        document.getElementById('users-container').innerHTML = users.map(u => `
            <div class="item-card">
                <div><strong>${u.username}</strong> (${u.role})<br><span style="font-size:12px;">Points: ${u.points}</span></div>
            </div>
        `).join('');

        // Draw Progression Chart
        const students = users.filter(u => u.role === 'student');
        const labels = students.map(s => s.username);
        const data = students.map(s => s.points);

        const ctx = document.getElementById('adminProgressChart').getContext('2d');
        if (window.adminChart) window.adminChart.destroy();
        window.adminChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: labels, datasets: [{ label: 'Skill Points', data: data, backgroundColor: '#D4880A' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function logout() { localStorage.removeItem('hive_user'); window.location.href = "index.html"; }
    loadAdminData();
</script>
</body>
</html>
