<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hive | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="thehive-modern.css">
    <style>
        /* Standalone overrides for the centralized login aesthetic */
        body {
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #2C1A00 0%, #0A0600 100%);
            overflow: hidden;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 136, 10, 0.2);
            border-radius: 24px; width: 100%; max-width: 420px; padding: 40px;
            backdrop-filter: blur(20px); box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative; z-index: 10;
        }

        .logo-container { text-align: center; margin-bottom: 30px; }
        .logo-container .sb-hex { margin: 0 auto 15px auto; width: 60px; height: 60px; font-size: 28px; }
        .logo-container h1 { color: #FDF8EE; font-size: 32px; margin: 0; }
        .logo-container p { color: rgba(253, 248, 238, 0.6); font-size: 14px; margin-top: 5px; }

        .auth-tabs { display: flex; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 5px; margin-bottom: 30px; }
        .auth-tab {
            flex: 1; text-align: center; padding: 10px; color: rgba(253, 248, 238, 0.5);
            font-weight: 700; cursor: pointer; border-radius: 8px; transition: 0.3s; font-size: 14px;
        }
        .auth-tab.active { background: var(--gold); color: #fff; box-shadow: 0 4px 15px rgba(212, 136, 10, 0.3); }

        .auth-panel { display: none; animation: fadeIn 0.4s ease; }
        .auth-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Input styling specifically for dark theme login */
        .auth-panel input, .auth-panel select {
            background: rgba(0,0,0,0.2); color: #FDF8EE; border: 1px solid rgba(255,255,255,0.1);
        }
        .auth-panel input::placeholder { color: rgba(255,255,255,0.3); }
        .auth-panel input:focus, .auth-panel select:focus { border-color: var(--gold); background: rgba(0,0,0,0.4); }
        .auth-panel label { display: block; color: rgba(253, 248, 238, 0.8); font-size: 12px; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; }
        .input-group { margin-bottom: 20px; }

        .error-msg { color: #FF4C4C; font-size: 13px; text-align: center; margin-top: 15px; display: none; font-weight: 500; }

        /* Background Particles */
        .particle { position: absolute; background: var(--gold); border-radius: 50%; opacity: 0.2; animation: float 15s infinite linear; }
        @keyframes float { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: translateY(-100px) scale(1); opacity: 0; } }
    </style>
    <style>
        /* =================================================================
           OPTION 3: FUTURISTIC LEARNING (DEFAULT DARK MODE) - BRIGHTER
           ================================================================= */
        body {
            /* Slightly brighter deep blue base instead of near-black */
            background-color: #081229 !important;

            /* Increased opacity for much brighter glowing corners and grid */
            background-image:
                radial-gradient(circle at 15% 50%, rgba(0, 242, 254, 0.35), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(255, 0, 222, 0.35), transparent 40%),
                linear-gradient(rgba(0, 242, 254, 0.12) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.12) 1px, transparent 1px) !important;
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px !important;
            background-attachment: fixed !important;
            transition: all 0.5s ease-in-out;
        }

        /* =================================================================
           OPTION 1: MODERN GRADIENT (LIGHT MODE) - BRIGHTER
           Activates when the body has class="light-mode"
           ================================================================= */
        body.light-mode {
            /* Pure white base to make colors pop */
            background-color: #ffffff !important;

            /* Increased opacity and spread for much more vibrant colors */
            background-image:
                radial-gradient(circle at 0% 0%, rgba(79, 172, 254, 0.5) 0%, transparent 70%),
                radial-gradient(circle at 100% 0%, rgba(0, 242, 254, 0.45) 0%, transparent 60%),
                radial-gradient(circle at 100% 100%, rgba(255, 0, 222, 0.35) 0%, transparent 70%) !important;
            background-size: 100% 100% !important;
        }

        /* =================================================================
           PROTECTING YOUR CONTAINERS
           ================================================================= */
        .command-center-container,
        .reset-password-container,
        .login-container,
        .overseer-panel {
            background: rgba(25, 18, 12, 0.95) !important;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5) !important;
        }
    </style>
</head>
<body>

<div class="hive-watermark">HIVE</div>
<div id="particles"></div>

<div class="auth-card">
    <div class="logo-container">
        <div class="sb-hex"><i class="fa-solid fa-graduation-cap"></i></div>
        <h1>The Hive</h1>
        <p>Access your academic ecosystem.</p>
    </div>

    <div class="auth-tabs" id="main-tabs">
        <div class="auth-tab active" onclick="switchTab('login')">Sign In</div>
        <div class="auth-tab" onclick="switchTab('register')">Register</div>
    </div>

    <div id="panel-login" class="auth-panel active">
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="l-email" placeholder="name@university.edu">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="l-pass" placeholder="••••••••">
        </div>
        <button class="btn-gold" style="width: 100%;" onclick="doLogin()">Secure Login <i class="fa-solid fa-arrow-right"></i></button>
        <p style="text-align:center; margin-top:15px; font-size:12px;">
            <a href="#" onclick="switchTab('forgot')" style="color: var(--gold);">Forgot Password?</a>
        </p>
        <div id="login-error" class="error-msg">Invalid credentials.</div>
    </div>

    <div id="panel-forgot" class="auth-panel">
        <h3 style="text-align:center; margin-bottom:15px; font-family: 'Syne';">Reset Password</h3>
        <div class="input-group">
            <label>Enter your Email</label>
            <input type="email" id="f-email" placeholder="name@university.edu">
        </div>
        <button class="btn-gold" id="btn-send-code" style="width: 100%;" onclick="sendResetCode()">Send Verification Code</button>
        <div id="reset-step-2" style="display:none; margin-top:20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
            <div class="input-group">
                <label>6-Digit Code</label>
                <input type="text" id="f-code" placeholder="123456">
            </div>
            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="f-new-pass" placeholder="••••••••">
            </div>
            <button class="btn-gold" id="btn-reset-pass" style="width: 100%;" onclick="resetPassword()">Confirm New Password</button>
        </div>
        <p style="text-align:center; margin-top:20px; font-size:12px;">
            <a href="#" onclick="switchTab('login')" style="color: var(--gold);"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
        </p>
    </div>

    <div id="panel-register" class="auth-panel">
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="r-name" placeholder="John Doe">
        </div>
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="r-email" placeholder="name@university.edu">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="r-pass" placeholder="Create a strong password">
        </div>
        <div class="input-group">
            <label>Account Type</label>
            <select id="r-role">
                <option value="student">🎓 Student</option>
                <option value="teacher">👨‍🏫 Faculty</option>
            </select>
        </div>
        <button class="btn-gold" style="width: 100%;" onclick="doRegister()">Create Account</button>
    </div>
</div>

<script>
    // --- UI Logic: Background Particles ---
    const pContainer = document.getElementById('particles');
    if (pContainer) {
        for(let i=0; i<20; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.width = p.style.height = (Math.random() * 10 + 5) + 'px';
            p.style.animationDuration = (Math.random() * 10 + 10) + 's';
            p.style.animationDelay = (Math.random() * 5) + 's';
            pContainer.appendChild(p);
        }
    }

    // --- UI Logic: Tab Switching ---
    function switchTab(tab) {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));

        // Hide top tabs if on forgot password screen
        const mainTabs = document.getElementById('main-tabs');
        if (tab === 'forgot') {
            mainTabs.style.display = 'none';
        } else {
            mainTabs.style.display = 'flex';
            const tabButton = document.querySelector(`[onclick="switchTab('${tab}')"]`);
            if (tabButton && tabButton.classList.contains('auth-tab')) {
                tabButton.classList.add('active');
            }
        }

        document.getElementById('panel-' + tab).classList.add('active');

        // Hide errors on tab switch
        const loginErr = document.getElementById('login-error');
        if(loginErr) loginErr.style.display = 'none';
    }

    // --- API Logic: Login ---
    async function doLogin() {
        const email = document.getElementById('l-email').value;
        const password = document.getElementById('l-pass').value;
        const errorMsg = document.getElementById('login-error');
        if(errorMsg) errorMsg.style.display = 'none';

        if(!email || !password) {
            if(errorMsg) {
                errorMsg.innerText = "Please fill in all fields.";
                errorMsg.style.display = 'block';
            } else { alert("Please fill in all fields."); }
            return;
        }

        try {
            const response = await fetch('/api/hive/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: email, password: password })
            });

            if (response.ok) {
                const userData = await response.json();
                localStorage.setItem('hive_user', JSON.stringify(userData));

                if (userData.role === 'admin') window.location.href = 'admin.html';
                else if (userData.role === 'teacher') window.location.href = 'teacher.html';
                else window.location.href = 'student.html';
            } else {
                if(errorMsg) {
                    errorMsg.innerText = "Invalid email or password.";
                    errorMsg.style.display = 'block';
                } else { alert("Invalid email or password."); }
            }
        } catch (error) {
            if(errorMsg) {
                errorMsg.innerText = "Cannot connect to server. Ensure backend is running.";
                errorMsg.style.display = 'block';
            } else { alert("Cannot connect to server."); }
        }
    }

    // --- API Logic: Register ---
    async function doRegister() {
        const name = document.getElementById('r-name').value;
        const email = document.getElementById('r-email').value;
        const password = document.getElementById('r-pass').value;
        const role = document.getElementById('r-role').value;

        if(!name || !email || !password) {
            alert("Please fill in all fields."); return;
        }

        try {
            const response = await fetch('/api/hive/register', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: name, email: email, password: password, role: role })
            });

            if (response.ok) {
                alert("Account created successfully! You can now log in.");
                switchTab('login');
                document.getElementById('l-email').value = email;
            } else {
                const errorText = await response.text();
                alert(errorText || "Email already exists or registration failed.");
            }
        } catch (error) {
            alert("Cannot connect to server. Ensure backend is running.");
        }
    }

    // --- API Logic: Password Reset ---
    async function sendResetCode() {
        const email = document.getElementById('f-email').value;
        if (!email) {
            alert("Please enter your email first."); return;
        }

        // Add Loading State
        const btn = document.getElementById('btn-send-code');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
        btn.disabled = true;

        try {
            const response = await fetch('/api/auth/forgot-password', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: email })
            });

            if (response.ok) {
                alert("Verification code sent! Please check your email inbox.");
                document.getElementById('reset-step-2').style.display = 'block';
            } else {
                const errorText = await response.text();
                alert("Error: " + errorText);
            }
        } catch (error) {
            alert("Cannot connect to server.");
        } finally {
            // Remove Loading State
            btn.innerHTML = 'Send Verification Code';
            btn.disabled = false;
        }
    }

    async function resetPassword() {
        const email = document.getElementById('f-email').value;
        const code = document.getElementById('f-code').value;
        const newPassword = document.getElementById('f-new-pass').value;

        if (!code || !newPassword) {
            alert("Please enter the code and a new password."); return;
        }

        // Add Loading State
        const btn = document.getElementById('btn-reset-pass');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Updating...';
        btn.disabled = true;

        try {
            const response = await fetch('/api/auth/reset-password', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: email, code: code, newPassword: newPassword })
            });

            if (response.ok) {
                alert("Password updated successfully! Please log in.");
                switchTab('login');
                document.getElementById('l-email').value = email;
                document.getElementById('f-code').value = '';
                document.getElementById('f-new-pass').value = '';
                document.getElementById('reset-step-2').style.display = 'none';
            } else {
                const errorText = await response.text();
                alert("Error: " + errorText);
            }
        } catch (error) {
            alert("Cannot connect to server.");
        } finally {
             // Remove Loading State
             btn.innerHTML = 'Confirm New Password';
             btn.disabled = false;
        }
    }
</script>
</body>
</html>
